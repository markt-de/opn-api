name: CI

env:
  BUNDLE_WITHOUT: development

on:
  push:
    branches:
    - master
    paths-ignore:
    - '**.md'
  pull_request:
    branches:
    - master
    paths-ignore:
    - '**.md'

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        ruby:
        - 3.1
        - 3.2
        - 3.3
        - 3.4
    steps:
    - uses: actions/checkout@v6
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby }}
        bundler-cache: true
    - name: Run tests
      run: bundle exec rake spec
